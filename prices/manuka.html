<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>عسل المنوكا</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        background-color: #f3e8dd;
      }

      .pdfs {
        margin: 0 auto;
        height: 100vh;
        width: 50%;
      }

      .pdfs img {
        display: block;
        width: 100%;
      }

      @media only screen and (max-width: 820px) {
        .pdfs {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="pdfs">
      <img src="img/manuka/1.jpg" alt="" />
      <img src="img/manuka/2.jpg" alt="" />
      <img src="img/manuka/3.jpg" alt="" />
      <img src="img/manuka/4.jpg" alt="" />
    </div>
  </body>
</html>
