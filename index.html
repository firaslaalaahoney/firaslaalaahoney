<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style-main.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <title>Firas Laalaa Honey</title>
  </head>
  <body>
    <div class="container">
      <form
        action="https://sheetdb.io/api/v1/ort637yu38foj"
        method="post"
        id="sheetdb-form"
      >
        <div class="img">
          <img src="profile-img.png" alt="" />
        </div>
        <p class="label">الإسم الكامل :</p>
        <input type="text" name="data[name]" required />
        <p class="label">رقم الهاتف :</p>
        <input type="number" name="data[phone_number]" required />
        <p class="footer">
          يرجى إرسال هذه المعلومات ليصلكم كل جديد عن العروضات والحسومات
        </p>
        <div class="button">
          <button id="skip-btn" type="button">تخطي</button>
          <button type="submit" id="submit-btn">إرسال</button>
        </div>
      </form>
    </div>
    <script>
      var form = document.getElementById("sheetdb-form");
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        fetch(form.action, {
          method: "POST",
          body: new FormData(document.getElementById("sheetdb-form")),
        })
          .then((response) => response.json())
          .then((html) => {
            // you can put any JS code here
            location.replace("HoneyFirasLaalaa.html");
          });
      });

      document
        .getElementById("skip-btn")
        .addEventListener("click", function () {
          location.replace("HoneyFirasLaalaa.html");
        });
    </script>
  </body>
</html>
